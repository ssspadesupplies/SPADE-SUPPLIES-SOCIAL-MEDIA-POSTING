name: Generate Weekly Content

on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate content with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate.js

      - name: Commit posts.json
        run: |
          git config --global user.email "content-bot@spadesupplies.com"
          git config --global user.name "Spade Content Bot"
          git add posts.json
          git diff --staged --quiet || git commit -m "Weekly content - $(date +%Y-%m-%d)"
          git push
